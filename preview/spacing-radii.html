<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .box{aspect-ratio:1.4/1;background:var(--bg-elevated);display:flex;align-items:flex-end;justify-content:center;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
  .r0{border-radius:0}.r1{border-radius:var(--r-sm)}.r2{border-radius:var(--r-md)}.r3{border-radius:var(--r-lg)}.r4{border-radius:var(--r-xl)}.rp{border-radius:var(--r-pill)}
</style></head>
<body>
<div class="row">
  <div class="box r0">0 · photos</div>
  <div class="box r1">4 · accents</div>
  <div class="box r2">8 · inputs</div>
  <div class="box r3">12 · cards</div>
  <div class="box rp" style="aspect-ratio:2.4/1">pill · buttons</div>
</div>
</body></html>
