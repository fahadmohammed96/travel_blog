<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .e{background:var(--bg-elevated);border-radius:var(--r-lg);padding:18px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);min-height:70px;}
  .n{font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--fg-1);margin-bottom:4px;}
  .e1{box-shadow:var(--shadow-1);}
  .e2{box-shadow:var(--shadow-2);}
  .e3{box-shadow:var(--shadow-3);}
  .e4{box-shadow:var(--shadow-4);}
</style></head>
<body>
<div class="row">
  <div class="e e1"><div class="n">shadow-1</div>resting</div>
  <div class="e e2"><div class="n">shadow-2</div>cards</div>
  <div class="e e3"><div class="n">shadow-3</div>popovers</div>
  <div class="e e4"><div class="n">shadow-4</div>hero / modal</div>
</div>
</body></html>
