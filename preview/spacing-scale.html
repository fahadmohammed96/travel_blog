<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .bar{height:14px;background:var(--clay-300);border-radius:2px;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:80px;}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
</style></head>
<body>
<div class="row"><div class="lbl">--s-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
<div class="row"><div class="lbl">--s-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
<div class="row"><div class="lbl">--s-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
<div class="row"><div class="lbl">--s-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
<div class="row"><div class="lbl">--s-5</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
<div class="row"><div class="lbl">--s-6</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
<div class="row"><div class="lbl">--s-7</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
<div class="row"><div class="lbl">--s-8</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
<div class="row"><div class="lbl">--s-9</div><div class="bar" style="width:96px"></div><div class="val">96px</div></div>
</body></html>
