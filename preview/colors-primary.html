<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{aspect-ratio:1.4/1;border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-mono);font-size:11px;color:var(--fg-1);}
  .sw.dark{color:var(--fg-on-dark);}
  .name{font-weight:600;}
  .hex{opacity:.7;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--cream-50);border:1px solid var(--border-soft)"><div class="name">cream/50</div><div class="hex">#FAF6EC</div></div>
  <div class="sw" style="background:var(--cream-100);border:1px solid var(--border-soft)"><div class="name">cream/100</div><div class="hex">#F2EDE4</div></div>
  <div class="sw" style="background:var(--cream-200)"><div class="name">cream/200</div><div class="hex">#E8E0D1</div></div>
  <div class="sw" style="background:var(--cream-300)"><div class="name">cream/300</div><div class="hex">#D9CFB9</div></div>
  <div class="sw dark" style="background:var(--forest-900)"><div class="name">forest/900</div><div class="hex">#16261C</div></div>
  <div class="sw dark" style="background:var(--forest-700)"><div class="name">forest/700 ★</div><div class="hex">#2D5A3D</div></div>
  <div class="sw dark" style="background:var(--forest-500)"><div class="name">forest/500</div><div class="hex">#5C8B6A</div></div>
  <div class="sw" style="background:var(--forest-100)"><div class="name">forest/100</div><div class="hex">#DDE7DE</div></div>
</div>
</body></html>
