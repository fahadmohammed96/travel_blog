<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:660px;}
  label{display:block;font-family:var(--font-body);font-size:12px;color:var(--fg-3);margin-bottom:6px;font-weight:500;}
  .field{padding:11px 14px;border:1px solid var(--border-strong);background:var(--bg-elevated);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;color:var(--fg-1);width:100%;box-sizing:border-box;}
  .field:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--forest-100);}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-pill);font-family:var(--font-body);font-size:12px;font-weight:500;background:var(--bg-elevated);border:1px solid var(--border);color:var(--fg-2);}
  .chip.on{background:var(--primary);color:var(--fg-on-dark);border-color:transparent;}
  .row{display:flex;gap:6px;flex-wrap:wrap;}
</style></head>
<body>
<div><label>Where to?</label><input class="field" placeholder="Lisbon, Tokyo, Oaxaca…" value="Lisbon"></div>
<div><label>When</label><input class="field" placeholder="September 2025" value="Sep 2025"></div>
<div style="grid-column:span 2"><label>Vibe</label><div class="row"><span class="chip on">Slow</span><span class="chip">Foodie</span><span class="chip">Solo</span><span class="chip">Off-season</span><span class="chip">Hiking</span></div></div>
</body></html>
