<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .tok{padding:14px;border-radius:var(--r-md);font-family:var(--font-mono);font-size:11px;color:#fff;}
</style></head>
<body>
<div class="row">
  <div class="tok" style="background:var(--success)">--success<br><span style="opacity:.75">#4F7A52</span></div>
  <div class="tok" style="background:var(--warning)">--warning<br><span style="opacity:.75">#D4924A</span></div>
  <div class="tok" style="background:var(--danger)">--danger<br><span style="opacity:.75">#B5462E</span></div>
  <div class="tok" style="background:var(--info)">--info<br><span style="opacity:.75">#4A6B7A</span></div>
</div>
</body></html>
