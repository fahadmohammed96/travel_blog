<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .tok{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg-elevated);border-radius:var(--r-md);}
  .chip{width:36px;height:36px;border-radius:var(--r-sm);flex:none;border:1px solid var(--border-soft);}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--fg-1);}
</style></head>
<body>
<div class="grid">
  <div class="tok"><div class="chip" style="background:var(--bg)"></div><div><div class="name">--bg</div><div class="meta">cream/100</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--bg-elevated)"></div><div><div class="name">--bg-elevated</div><div class="meta">cream/50</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--primary)"></div><div><div class="name">--primary</div><div class="meta">forest/700</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--accent)"></div><div><div class="name">--accent</div><div class="meta">clay/600</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--fg-1)"></div><div><div class="name">--fg-1</div><div class="meta">ink/1000 · headings</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--fg-2)"></div><div><div class="name">--fg-2</div><div class="meta">ink/700 · body</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--fg-3)"></div><div><div class="name">--fg-3</div><div class="meta">ink/500 · caption</div></div></div>
  <div class="tok"><div class="chip" style="background:var(--border-strong)"></div><div><div class="name">--border</div><div class="meta">12% ink</div></div></div>
</div>
</body></html>
