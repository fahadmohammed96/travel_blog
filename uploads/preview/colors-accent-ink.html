<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{aspect-ratio:1.4/1;border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-mono);font-size:11px;color:var(--fg-1);}
  .sw.dark{color:var(--fg-on-dark);}
  .name{font-weight:600;}
  .hex{opacity:.7;}
</style></head>
<body>
<div class="row">
  <div class="sw dark" style="background:var(--clay-900)"><div class="name">clay/900</div><div class="hex">#5A3214</div></div>
  <div class="sw dark" style="background:var(--clay-700)"><div class="name">clay/700</div><div class="hex">#A55A28</div></div>
  <div class="sw dark" style="background:var(--clay-600)"><div class="name">clay/600 ★</div><div class="hex">#C97B3A</div></div>
  <div class="sw" style="background:var(--clay-300)"><div class="name">clay/300</div><div class="hex">#E8B894</div></div>
  <div class="sw dark" style="background:var(--ink-1000)"><div class="name">ink/1000</div><div class="hex">#0F1A14</div></div>
  <div class="sw dark" style="background:var(--ink-700)"><div class="name">ink/700</div><div class="hex">#4A5249</div></div>
  <div class="sw" style="background:var(--ink-500);color:#fff"><div class="name">ink/500</div><div class="hex">#767A6F</div></div>
  <div class="sw" style="background:var(--ink-200)"><div class="name">ink/200</div><div class="hex">#C9C8BC</div></div>
</div>
</body></html>
