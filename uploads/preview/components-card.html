<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .card{width:300px;background:var(--bg-elevated);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-2);font-family:var(--font-body);transition:box-shadow 420ms var(--ease-out);}
  .card:hover{box-shadow:var(--shadow-3);}
  .img{aspect-ratio:4/3;background:linear-gradient(135deg,#A55A28,#5C8B6A);}
  .body{padding:16px 18px 20px;}
  .eb{font-family:var(--font-body);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--clay-600);}
  .ttl{font-family:var(--font-display);font-weight:400;font-size:24px;line-height:1.1;letter-spacing:-0.015em;color:var(--fg-1);margin:6px 0 8px;font-variation-settings:'opsz' 48;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="card">
  <div class="img"></div>
  <div class="body">
    <div class="eb">DIARY · PORTUGAL</div>
    <div class="ttl">Three days lost in Porto</div>
    <div class="meta">5 min read · Sep 2025</div>
  </div>
</div>
</body></html>
