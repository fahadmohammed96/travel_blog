<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Oops I Roamed — Prototipo</title>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <rect width="200" height="200" fill="#F8F4EC"/>
      <circle cx="100" cy="80" r="38" fill="#F5C547" opacity="0.85"/>
      <path d="M 30 150 Q 70 130 100 145 T 170 140" stroke="#E87B5A" stroke-width="6" fill="none" stroke-linecap="round"/>
      <text x="100" y="180" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="18" fill="#1F2A22">Oops I Roamed</text>
    </svg>
  </template>
  <meta name="viewport" content="width=1280" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="flows.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="share.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    function App() {
      const [route, setRoute] = useState({ name: 'home', params: {} });
      const [user, setUser] = useState(null);
      const [bookings, setBookings] = useState([]);
      const [bespokes, setBespokes] = useState([]);
      const [photos, setPhotos] = useState([]);
      const [saved, setSaved] = useState({ articles: new Set(), trips: new Set() });
      const [isSubscribed, setIsSubscribed] = useState(false);
      const [toast, setToast] = useState(null);

      const showToast = useCallback((msg, icon = 'check') => {
        setToast({ msg, icon });
        setTimeout(() => setToast(null), 2400);
      }, []);

      const go = useCallback((name, params = {}) => {
        setRoute({ name, params });
        window.scrollTo({ top: 0, behavior: 'instant' });
        if (params.welcome) showToast('Benvenuta! Ecco le storie scelte per te.', 'sparkles');
      }, [showToast]);

      const toggleSave = useCallback((kind, id) => {
        setSaved(prev => {
          const next = { articles: new Set(prev.articles), trips: new Set(prev.trips) };
          if (next[kind].has(id)) { next[kind].delete(id); showToast('Rimosso dai salvati', 'heart-off'); }
          else { next[kind].add(id); showToast('Salvato per dopo', 'heart'); }
          return next;
        });
      }, [showToast]);

      const subscribe = useCallback((email) => { setIsSubscribed(true); showToast('Iscritta al dispaccio', 'mail'); }, [showToast]);
      const addBooking = useCallback((b) => setBookings(prev => [...prev, b]), []);
      const addBespoke = useCallback((b) => setBespokes(prev => [...prev, b]), []);
      const addPhotos = useCallback((p) => { setPhotos(prev => [...prev, p]); showToast('Foto inviate al diario', 'image'); }, [showToast]);
      const signout = useCallback(() => { setUser(null); setBookings([]); setBespokes([]); setPhotos([]); setSaved({ articles: new Set(), trips: new Set() }); go('home'); }, [go]);

      const ctx = useMemo(() => ({ go, user, setUser, bookings, addBooking, bespokes, addBespoke, photos, addPhotos, saved, toggleSave, isSubscribed, subscribe, signout }),
        [go, user, bookings, bespokes, photos, saved, isSubscribed, addBooking, addBespoke, addPhotos, toggleSave, subscribe, signout]);

      // Icon ora renderizza SVG inline — non serve più lucide.createIcons() qui

      const showHeader = route.name !== 'signup';
      const showFooter = !['signup', 'book', 'bespoke', 'share'].includes(route.name);

      let page;
      switch (route.name) {
        case 'home': page = <Home />; break;
        case 'trips': page = <TripsList />; break;
        case 'trip': page = <TripDetail params={route.params} />; break;
        case 'book': page = <Booking params={route.params} />; break;
        case 'diary': page = <DiaryList params={route.params} />; break;
        case 'article': page = <Article params={route.params} />; break;
        case 'bespoke': page = <Bespoke />; break;
        case 'signup': page = <Signup />; break;
        case 'account': page = <Account />; break;
        case 'countries': page = <CountriesPage />; break;
        case 'seasons': page = <SeasonsPage />; break;
        case 'groups': page = <GroupsPage />; break;
        case 'gift': page = <GiftPage params={route.params} />; break;
        case 'story': page = <StoryPage />; break;
        case 'press': page = <PressPage />; break;
        case 'contact': page = <ContactPage />; break;
        case 'faq': page = <FaqPage />; break;
        case 'guide': page = <GuidePage />; break;
        case 'types': page = <TripTypesPage />; break;
        case 'shop': page = <ShopPage />; break;
        case 'share': page = <Share params={route.params} />; break;
        case 'privacy': page = <LegalPage pageKey="privacy" />; break;
        case 'terms': page = <LegalPage pageKey="terms" />; break;
        case 'cookie': page = <LegalPage pageKey="cookie" />; break;
        default: page = <Home />;
      }

      return (
        <AppCtx.Provider value={ctx}>
          {showHeader && <Header active={route.name} onNav={(n, p) => go(n, p)} user={user} />}
          <main key={route.name + JSON.stringify(route.params)}>{page}</main>
          {showFooter && <Footer />}
          {toast && <Toast icon={toast.icon}>{toast.msg}</Toast>}
        </AppCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
